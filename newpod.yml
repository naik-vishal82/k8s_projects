kind: Pod
apiVersion: v1
metadata:
  name: newpod
spec:
  containers:
    - name: container1
      image: ubuntu
      command: ["/bin/bash", "-c", "while true; do echo It is Ubuntu; sleep 5 ; done"]
    - name: container2
      image: debian
      command: ["/bin/bash", "-c", "while true; do echo It is Debian; sleep 5 ; done"]
  restartPolicy: Never
