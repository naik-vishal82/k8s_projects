apiVersion: apps/v1
kind: Deployment
metadata:
  name: eks-web-2
  labels:
     app: csweb

spec:
  replicas: 2
  selector:
    matchLabels:
      app: csweb

  template:
    metadata:
      labels:
        app: csweb
    spec:
      containers:
      - name: csweb
        image: vishumana/dockerproject:counterstrike2
        imagePullPolicy: Always
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: eks-service-2
  labels:
    app: csweb
spec:
  selector:
    app: csweb
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer

